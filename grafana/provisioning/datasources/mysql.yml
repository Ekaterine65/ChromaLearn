apiVersion: 1

datasources:
  - name: ChromaLearn MySQL
    uid: chromalearn-mysql
    type: mysql
    access: proxy
    url: db:3306
    database: chromalearn
    user: ${GRAFANA_MYSQL_USER}
    secureJsonData:
      password: ${GRAFANA_MYSQL_PASSWORD}
    jsonData:
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      timezone: "+00:00"
    isDefault: true
    editable: true
