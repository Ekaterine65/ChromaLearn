version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: chroma_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: chromalearn
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: chroma_app
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:123@db:3306/chromalearn
      SECRET_KEY: supersecret

volumes:
  db_data: