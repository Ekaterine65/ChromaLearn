server {
    listen 80;
    server_name _;

    location = /admin/grafana {
        return 301 /admin/grafana/;
    }

    location = /admin/grafana-auth {
        internal;
        proxy_pass http://web:5000/admin/grafana-auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/grafana/ {
        auth_request /admin/grafana-auth;
        auth_request_set $auth_user $upstream_http_x_webauth_user;
        error_page 401 = @login;

        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-WEBAUTH-USER $auth_user;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin/grafana;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location @login {
        return 302 /auth/login?next=$request_uri;
    }

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
